<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Memory | 联合培养成长档案</title>
    <style>
        /* === 1. 全局设定 === */
        :root {
            --main-blue: #006C9E;
            --accent-yellow: #FFD700;
            --bg-light: #F2F8FD;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: #333;
            font-family: "Noto Serif SC", "Songti SC", "Times New Roman", serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;

            /* 动画背景：流动的网格 */
            background-image:
                linear-gradient(rgba(0, 108, 158, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 108, 158, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: bgScroll 20s linear infinite;
        }

        @keyframes bgScroll {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 60px 60px;
            }
        }

        .desc,
        .caption,
        .hud-item,
        .btn-start,
        .dock-btn,
        h2.subtitle,
        .event-label-title,
        .event-label-date {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* === 2. 启动页 (增加退场动画) === */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(242, 248, 253, 0.98);
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* 退场时的类 */
        #start-screen.fade-out {
            opacity: 0;
            transform: scale(1.1);
            /* 稍微放大淡出，更有电影感 */
            pointer-events: none;
        }

        .logos-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .start-logo {
            height: 100px;
            width: auto;
            filter: drop-shadow(0 4px 10px rgba(0, 108, 158, 0.15));
        }

        .logo-divider {
            color: var(--accent-yellow);
            font-size: 30px;
            font-weight: 300;
            opacity: 0.5;
        }

        /* 标题入场动画 */
        #start-screen h1 {
            color: var(--main-blue);
            font-weight: bold;
            font-size: 2.8rem;
            margin: 0 0 15px 0;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease-out;
        }

        h2.subtitle {
            color: #666;
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 60px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent-yellow);
            padding-bottom: 10px;
            animation: fadeInUp 1s ease-out 0.2s backwards;
            /* 延迟播放 */
        }

        .btn-start {
            background: var(--main-blue);
            border: none;
            color: white;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0, 108, 158, 0.2);
            letter-spacing: 4px;
            animation: fadeInUp 1s ease-out 0.4s backwards;
        }

        .btn-start:hover {
            background: #005680;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(0, 108, 158, 0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === 3. 顶部 HUD === */
        #top-hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 500;
            display: flex;
            align-items: center;
            padding: 0 30px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transform: translateY(-100%);
            transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #top-hud.visible {
            transform: translateY(0);
        }

        #header-logo {
            height: 50px;
            width: auto;
            margin-right: 20px;
        }

        .hud-text {
            font-size: 14px;
            color: var(--main-blue);
            font-weight: bold;
            letter-spacing: 1px;
        }

        #music-control {
            position: fixed;
            top: 15px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: white;
            color: var(--main-blue);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 2000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            border: 2px solid var(--main-blue);
            transition: 0.3s;
            border-radius: 50%;
            opacity: 0;
            transform: scale(0);
        }

        #music-control.visible {
            opacity: 1;
            transform: scale(1);
        }

        #music-control:hover {
            background: var(--main-blue);
            color: white;
            transform: scale(1.1);
        }

        .rotating {
            animation: spin 5s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* === 4. 场景切换动画 (核心) === */
        .stage-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            padding-top: 80px;
            box-sizing: border-box;

            /* 转场动画关键属性 */
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.6s ease;
            transform: scale(0.95) translateY(20px);
            /* 初始状态：稍微缩小并下沉 */
            filter: blur(10px);
            /* 初始状态：模糊 */
        }

        .stage-section.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 20;
            transform: scale(1) translateY(0);
            /* 激活状态：正常 */
            filter: blur(0);
        }

        .section-header {
            text-align: center;
            margin-bottom: 20px;
            flex-shrink: 0;
            z-index: 30;
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 40px;
            backdrop-filter: blur(5px);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--main-blue);
        }

        .desc {
            font-size: 1rem;
            color: #666;
            margin: 0;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* === 5. 核心容器 === */
        .scroll-grid-container {
            position: relative;
            width: 100vw;
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            grid-auto-rows: 260px;
            grid-auto-flow: dense;
            gap: 0;
            padding: 0;
            overflow-y: auto;
            scrollbar-width: none;
            background: #fff;
        }

        .scroll-grid-container::-webkit-scrollbar {
            display: none;
        }

        /* === 媒体卡片动画增强 === */
        .media-card {
            position: relative;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            overflow: hidden;
            border-radius: 0;
            box-sizing: border-box;
            border: 1px solid #fff;
            transition: all 0.3s ease;
            cursor: pointer;
            z-index: 1;
        }

        .media-card.video-card {
            grid-column: span 2;
            grid-row: span 2;
            z-index: 2;
            border: 3px solid var(--accent-yellow);
        }

        .media-card .media-wrapper {
            width: 100%;
            height: 100%;
            background: #ccc;
        }

        .media-content {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        /* 悬停效果：轻微上浮 + 图片放大 */
        .media-card:hover {
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: scale(1.02);
            border-color: var(--accent-yellow);
        }

        .media-card:hover .media-content {
            transform: scale(1.1);
        }

        /* 光感扫过效果 (Shine Effect) */
        .media-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-25deg);
            transition: 0s;
            pointer-events: none;
            z-index: 5;
        }

        .media-card:hover::before {
            left: 150%;
            transition: 0.75s ease;
            /* 鼠标移入时扫光 */
        }

        /* === School 顶部事件栏 (入场动画) === */
        .events-top-bar {
            width: 100vw;
            height: 160px;
            display: flex;
            background: #fff;
            border-bottom: 2px solid var(--accent-yellow);
            box-shadow: 0 10px 30px rgba(0, 108, 158, 0.1);
            z-index: 50;
            flex-shrink: 0;
        }

        .top-event-card {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            position: relative;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: default;

            /* 初始状态用于动画 */
            opacity: 0;
            transform: translateY(-20px);
        }

        /* 顺序入场动画类 */
        .stage-section.active .top-event-card {
            animation: slideDownFade 0.5s forwards;
        }

        /* 为每个子元素设置延迟，形成波浪效果 */
        .stage-section.active .top-event-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .stage-section.active .top-event-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        .stage-section.active .top-event-card:nth-child(3) {
            animation-delay: 0.3s;
        }

        .stage-section.active .top-event-card:nth-child(4) {
            animation-delay: 0.4s;
        }

        .stage-section.active .top-event-card:nth-child(5) {
            animation-delay: 0.5s;
        }

        .stage-section.active .top-event-card:nth-child(6) {
            animation-delay: 0.6s;
        }

        .stage-section.active .top-event-card:nth-child(7) {
            animation-delay: 0.7s;
        }

        @keyframes slideDownFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .top-event-card:last-child {
            border-right: none;
        }

        .top-event-card:hover {
            flex: 1.2;
            filter: brightness(1.1);
        }

        .pattern-grid {
            background-color: var(--main-blue);
            background-image: linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .pattern-dots {
            background-color: var(--main-blue);
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1.5px, transparent 1.5px);
            background-size: 15px 15px;
        }

        .pattern-stripes {
            background-color: var(--main-blue);
            background: repeating-linear-gradient(45deg, var(--main-blue), var(--main-blue) 10px, #005680 10px, #005680 20px);
        }

        .event-icon-box {
            font-size: 36px;
            margin-bottom: 10px;
            color: var(--accent-yellow);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .top-event-card:hover .event-icon-box {
            transform: scale(1.2) rotate(10deg);
        }

        /* 图标动效 */

        .event-label-date {
            font-size: 0.9rem;
            opacity: 0.9;
            font-family: 'Courier New', monospace;
            margin-bottom: 5px;
        }

        .event-label-title {
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.2;
        }

        /* === ★★★ Future 专用布局 ★★★ === */
        .future-split-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding-bottom: 100px;
        }

        .future-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-bottom: 4px solid var(--accent-yellow);
        }

        .future-half:last-child {
            border-bottom: none;
        }

        .future-subtitle {
            background: #fff;
            padding: 10px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bg-warm {
            color: #d35400;
            border-left: 5px solid #d35400;
        }

        .bg-cool {
            color: var(--main-blue);
            border-left: 5px solid var(--main-blue);
        }

        .future-scroll-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            grid-auto-rows: 200px;
            grid-auto-flow: dense;
            gap: 0;
        }

        .future-scroll-area::-webkit-scrollbar {
            display: none;
        }

        /* === 魔法按钮 & 层叠容器 === */
        .future-layer-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .future-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 1s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.8s ease;
            background: var(--bg-light);
        }

        #layer-real {
            z-index: 10;
            transform: translateY(0);
            opacity: 1;
        }

        #layer-ai {
            z-index: 20;
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
        }

        .future-mode-active #layer-real {
            transform: scale(0.9);
            opacity: 0.5;
            filter: blur(5px);
        }

        .future-mode-active #layer-ai {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        #magic-toggle-btn {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--accent-yellow), #f1c40f);
            color: #333;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(245, 166, 35, 0.4);
            z-index: 9999;
            transition: all 0.3s;
            display: none;
            animation: pulseBtn 2s infinite;
            /* 呼吸动画 */
        }

        #magic-toggle-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 15px 40px rgba(245, 166, 35, 0.6);
            animation: none;
            /* 悬停时停止呼吸，保持放大 */
        }

        @keyframes pulseBtn {
            0% {
                transform: translateX(-50%) scale(1);
                box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.7);
            }

            70% {
                transform: translateX(-50%) scale(1.05);
                box-shadow: 0 0 0 15px rgba(245, 166, 35, 0);
            }

            100% {
                transform: translateX(-50%) scale(1);
                box-shadow: 0 0 0 0 rgba(245, 166, 35, 0);
            }
        }

        /* === 6. Dock === */
        #timeline-dock {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            height: 64px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #fff;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            gap: 5px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 108, 158, 0.15);
            backdrop-filter: blur(20px);
            /* Dock 入场动画 */
            transform: translateX(-50%) translateY(100px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        #timeline-dock.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .dock-btn {
            position: relative;
            width: 140px;
            height: 48px;
            background: transparent;
            border: none;
            color: #888;
            border-radius: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .dock-btn:hover {
            color: var(--main-blue);
            background: #f0f7ff;
            transform: translateY(-2px);
        }

        .dock-btn.active {
            background: var(--main-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 108, 158, 0.2);
        }

        /* === Lightbox === */
        #lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 放大时的动画 */
        #lightbox-content-box {
            max-width: 90%;
            max-height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #lightbox-overlay.active #lightbox-content-box {
            transform: scale(1);
        }

        #lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            display: block;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        #lightbox-video {
            max-width: 100%;
            max-height: 90vh;
            display: block;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        #lightbox-close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            z-index: 10001;
            transition: transform 0.2s;
        }

        #lightbox-close-btn:hover {
            transform: rotate(90deg);
            color: var(--accent-yellow);
        }
    </style>
</head>

<body>

    <audio id="bgm-player" loop></audio>
    <div id="music-control" onclick="toggleMusic()">🎵</div>

    <div id="lightbox-overlay" onclick="closeLightbox()">
        <div id="lightbox-close-btn">&times;</div>
        <div id="lightbox-content-box" onclick="event.stopPropagation()"></div>
    </div>

    <div id="start-screen">
        <div class="logos-container">
            <img src="fafu_logo.png" class="start-logo" alt="FAFU">
            <span class="logo-divider">×</span>
            <img src="logo.png" class="start-logo" alt="TJU">
        </div>
        <h1>福建农林大学 & 天津大学福州国际联合学院</h1>
        <h2 class="subtitle">AI 联合培养 · 青春成长档案</h2>
        <button class="btn-start" onclick="startApp()">开启记忆之旅</button>
    </div>

    <div id="top-hud">
        <img src="logo.png" id="header-logo" alt="Logo">
        <span class="hud-text">Joint Institute AI Program | Class 2026</span>
    </div>

    <div id="phase-life" class="stage-section">
        <div class="section-header">
            <h2>生活点滴 · Input Layer</h2>
            <div class="desc">散落在时光长河中的温暖瞬间</div>
        </div>
        <div class="scroll-grid-container" id="container-life"></div>
    </div>

    <div id="phase-school" class="stage-section">
        <div class="section-header">
            <h2>校园求索 · Hidden Layer</h2>
            <div class="desc">特征提取，参数收敛</div>
        </div>
        <div id="school-events-bar" class="events-top-bar"></div>
        <div class="scroll-grid-container" id="container-school"></div>
    </div>

    <div id="phase-future" class="stage-section">
        <button id="magic-toggle-btn" onclick="toggleFutureView()">✨ 生成未来愿景</button>

        <div class="future-layer-container" id="future-container">
            <div id="layer-real" class="future-layer">
                <div class="future-subtitle bg-warm"><span>🔥</span> 此时此刻 · 鲜活校园 (Current Vitality)</div>
                <div class="scroll-grid-container" id="container-future-real"></div>
            </div>

            <div id="layer-ai" class="future-layer">
                <div class="future-subtitle bg-cool"><span>🚀</span> 智慧彼方 · 未来愿景 (Future Vision)</div>
                <div class="scroll-grid-container" id="container-future-ai"></div>
            </div>
        </div>
    </div>

    <nav id="timeline-dock">
        <div class="dock-btn active" onclick="switchStage('life')">生活点滴</div>
        <div class="dock-btn" onclick="switchStage('school')">校园求索</div>
        <div class="dock-btn" onclick="switchStage('future')">未来展望</div>
    </nav>

        const schoolEvents = [
            { date: "09/15", title: "开学典礼", icon: "🎓" },
            { date: "09/18", title: "开学第一课", icon: "📚" },
            { date: "09/26", title: "双节活动", icon: "🎑" },
            { date: "11/15", title: "水果节", icon: "🍉" },
            { date: "12/16", title: "冬至包饺子", icon: "🥟" },
            { date: "12/22", title: "田间实践", icon: "🌾" },
            { date: "12/29", title: "元旦联欢", icon: "🎉" }
        ];

        const bgmPlayer = document.getElementById('bgm-player');
        const musicBtn = document.getElementById('music-control');
        const magicBtn = document.getElementById('magic-toggle-btn');
        const futureContainer = document.getElementById('future-container');
        const startScreen = document.getElementById('start-screen');
        const topHud = document.getElementById('top-hud');
        const timelineDock = document.getElementById('timeline-dock');

        let scrollTimers = [];
        let isHovered = false;
        let isFutureModeAI = false;

        function startApp() {
            // 启动动画：淡出并移除
            startScreen.classList.add('fade-out');
            setTimeout(() => {
                startScreen.style.display = 'none';
                // 只有当启动页消失后，才显示 UI
                topHud.style.display = 'flex';
                timelineDock.style.display = 'flex';
                // 触发入场动画
                setTimeout(() => {
                    topHud.classList.add('visible');
                    timelineDock.classList.add('visible');
                    musicBtn.classList.add('visible');
                }, 100);
            }, 800);

            bgmPlayer.src = 'photos/bgm.mp3';
            bgmPlayer.volume = 0.5;
            playMusic();
            musicBtn.style.display = 'flex';

            initContent();
            switchStage('life');
        }

        function playMusic() {
            bgmPlayer.play().then(() => {
                musicBtn.classList.add('rotating');
            }).catch(e => { console.log("Autoplay blocked"); });
        }

        function toggleMusic() {
            if (bgmPlayer.paused) {
                bgmPlayer.play(); musicBtn.classList.add('rotating');
            } else {
                bgmPlayer.pause(); musicBtn.classList.remove('rotating');
            }
        }

        function toggleFutureView() {
            isFutureModeAI = !isFutureModeAI;
            if (isFutureModeAI) {
                futureContainer.classList.add('future-mode-active');
                magicBtn.innerText = "↩ 回到现实";
                magicBtn.style.background = "linear-gradient(135deg, #fff, #ddd)";
            } else {
                futureContainer.classList.remove('future-mode-active');
                magicBtn.innerText = "✨ 生成未来愿景";
                magicBtn.style.background = "linear-gradient(135deg, var(--accent-yellow), #f1c40f)";
            }
        }

        function createMedia(item, cls) {
            if (item.type === 'video') return `<video class="${cls}" src="${item.src}" muted loop autoplay playsinline></video>`;
            return `<img class="${cls}" src="${item.src}">`;
        }

        function createCard(item) {
            if (item.type === 'event') {
                const el = document.createElement('div');
                const patterns = ['pattern-grid', 'pattern-dots', 'pattern-stripes'];
                const patternClass = patterns[item.patternIndex] || patterns[0];
                el.className = `top-event-card ${patternClass}`;
                el.innerHTML = `
                    <div class="event-icon-box">${item.icon}</div>
                    <div class="event-label-title">${item.title}</div>
                    <div class="event-label-date">DATE: ${item.date}</div>
                `;
                return el;
            }

            const el = document.createElement('div');
            el.className = 'media-card';
            if (item.type === 'video') el.classList.add('video-card');
            el.setAttribute('onclick', `openLightbox('${item.src}', '${item.type}')`);
            el.innerHTML = `<div class="media-wrapper">${createMedia(item, 'media-content')}</div>`;
            return el;
        }

        function openLightbox(src, type) {
            isHovered = true;
            const overlay = document.getElementById('lightbox-overlay');
            const contentBox = document.getElementById('lightbox-content-box');
            contentBox.innerHTML = '';

            if (type === 'video') {
                contentBox.innerHTML = `<video id="lightbox-video" src="${src}" controls autoplay></video>`;
            } else {
                contentBox.innerHTML = `<img id="lightbox-img" src="${src}">`;
            }
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.classList.add('active'); }, 10);
        }

        function closeLightbox() {
            const overlay = document.getElementById('lightbox-overlay');
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('lightbox-content-box').innerHTML = '';
                isHovered = false;
            }, 300);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initContent() {
            renderSection('container-life', appData.life, 100);
            renderSchoolSection();
            renderSection('container-future-real', appData.future.real, 100);
            renderSection('container-future-ai', appData.future.ai, 100);
        }

        function renderSection(containerId, data, minCount = 100) {
            const box = document.getElementById(containerId);
            if (!box) return;
            box.innerHTML = '';

            if (!data || data.length === 0) return;

            let displayData = [...data];
            if (displayData.length > 0) {
                while (displayData.length < minCount) displayData = [...displayData, ...displayData];
                shuffleArray(displayData);
            }
            displayData.forEach(item => box.appendChild(createCard(item)));
            box.addEventListener('mouseenter', () => isHovered = true);
            box.addEventListener('mouseleave', () => isHovered = false);
        }

        function renderSchoolSection() {
            const bar = document.getElementById('school-events-bar');
            bar.innerHTML = '';
            schoolEvents.forEach((evt, index) => {
                evt.patternIndex = index % 3;
                bar.appendChild(createCard({ type: 'event', ...evt }));
            });

            renderSection('container-school', appData.school, 150);
        }

        function startAutoScroll(containerIds) {
            stopAutoScroll();
            const ids = Array.isArray(containerIds) ? containerIds : [containerIds];

            ids.forEach(id => {
                const box = document.getElementById(id);
                if (!box) return;

                const timer = setInterval(() => {
                    if (isHovered) return;
                    box.scrollTop += 1;
                    if (box.scrollTop + box.clientHeight >= box.scrollHeight - 5) {
                        box.scrollTop = 0;
                    }
                }, 30);
                scrollTimers.push(timer);
            });
        }

        function stopAutoScroll() {
            scrollTimers.forEach(t => clearInterval(t));
            scrollTimers = [];
        }

        function switchStage(stageName) {
            document.querySelectorAll('.stage-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.dock-btn').forEach(el => el.classList.remove('active'));
            magicBtn.style.display = 'none';

            stopAutoScroll();
            isHovered = false;
            if (isFutureModeAI) toggleFutureView();

            if (stageName === 'life') {
                document.getElementById('phase-life').classList.add('active');
                document.querySelectorAll('.dock-btn')[0].classList.add('active');
                startAutoScroll('container-life');
            }
            else if (stageName === 'school') {
                document.getElementById('phase-school').classList.add('active');
                document.querySelectorAll('.dock-btn')[1].classList.add('active');
                startAutoScroll('container-school');
            }
            else if (stageName === 'future') {
                document.getElementById('phase-future').classList.add('active');
                document.querySelectorAll('.dock-btn')[2].classList.add('active');
                magicBtn.style.display = 'block';
                startAutoScroll(['container-future-real', 'container-future-ai']);
            }
        }
    </script>
